app-id: com.Rafpren.RustCalc
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: rustcalc

build-options:
  build-args:
    - --share=network

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: rustcalc
    buildsystem: simple
    build-commands:
      # 1. Installation de Rustup (stable)
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      
      # 2. Appel direct du binaire cargo (on évite le 'source' qui plante)
      - /run/build/rustcalc/.cargo/bin/cargo build --release
      
      # 3. Installation des fichiers dans les répertoires applicatifs
      - install -D target/release/rustcalc /app/bin/rustcalc
      - install -D com.Rafpren.RustCalc.desktop /app/share/applications/com.Rafpren.RustCalc.desktop
      - install -D icon.png /app/share/icons/hicolor/256x256/apps/com.Rafpren.RustCalc.png
    sources:
      - type: dir
        path: .
