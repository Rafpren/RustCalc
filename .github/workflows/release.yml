name: Release RustCalc

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: rustcalc.exe
          - os: ubuntu-latest
            artifact_name: rustcalc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies and RPM tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev rpm
          cargo install cargo-deb cargo-generate-rpm

      - name: Build Windows Release (Static CRT)
        if: matrix.os == 'windows-latest'
        env:
          # Injection de l'antidote : on force le linker statique pour tuer la dépendance VCRUNTIME
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release

      - name: Build Linux Packages (.deb & .rpm)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --release
          cargo deb
          cargo generate-rpm

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: assets-windows
          path: target/release/rustcalc.exe

      - name: Upload Linux Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: assets-linux
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  create_release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}