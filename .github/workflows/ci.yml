name: Rust CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Compilation & Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation des dépendances Linux (egui/eframe)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev

      - name: Installation du toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache des dépendances
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "v2-cache-bust" # Invalidation volontaire pour détruire un éventuel cache LTO corrompu

      - name: Vérification du format (rustfmt)
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Analyse statique (clippy)
        run: cargo clippy -- -D warnings

      - name: Exécution des tests Windows (Static CRT)
        if: matrix.os == 'windows-latest'
        env:
          # Ciblage strict : le flag s'applique uniquement à la cible MSVC, pas aux macros procédurales hôtes
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: "-C target-feature=+crt-static"
        # L'argument --target oblige Cargo à dissocier proprement le contexte hôte (macros) et cible
        run: cargo test --target x86_64-pc-windows-msvc --verbose

      - name: Exécution des tests Linux
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --verbose